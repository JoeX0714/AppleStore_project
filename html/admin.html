<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple Store 后台管理</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <nav class="apple-nav">
      <div class="container">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="index.html" id="nav-logo" class="nav-logo">
              <img src="../images/Apple-Logo.png" alt="Apple Logo" />
            </a>
          </li>
          <li class="nav-item"><a href="index.html">商店</a></li>
          <li class="nav-item"><a href="index.html?tab=mac">Mac</a></li>
          <li class="nav-item"><a href="index.html?tab=ipad">iPad</a></li>
          <li class="nav-item"><a href="index.html?tab=iphone">iPhone</a></li>
          <li class="nav-item"><a href="index.html?tab=watch">Watch</a></li>
          <li class="nav-item"><a href="index.html?tab=airpods">AirPods</a></li>
          <li class="nav-item" id="nav-user">
            <a href="javascript:void(0)" class="nav-avatar-link" aria-label="已登录用户">
              <svg class="nav-avatar-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path>
              </svg>
            </a>
            <ul class="user-menu">
              <li><button id="admin-menu-store" type="button">返回商店</button></li>
              <li><button id="admin-menu-logout" type="button">退出登录</button></li>
            </ul>
          </li>
        </ul>
      </div>
    </nav>

    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="admin-eyebrow">Apple Store</p>
          <h1>后台管理</h1>
        </div>
        <div class="admin-actions">
          <a href="admin-users.html" class="account-back-btn">用户总览</a>
          <button id="admin-refresh-btn" class="buy-btn" type="button">刷新</button>
          <button id="admin-logout-btn" class="account-back-btn" type="button">退出</button>
        </div>
      </header>

      <p id="admin-tip" class="form-tip"></p>
      <section id="admin-summary" class="admin-summary"></section>

      <section class="admin-panel">
        <h2>商品入库</h2>
        <form id="admin-product-form" class="admin-product-form">
          <input id="admin-product-name" type="text" placeholder="商品名称" required />
          <select id="admin-category" required>
            <option value="mac">Mac</option>
            <option value="ipad">iPad</option>
            <option value="iphone">iPhone</option>
            <option value="watch">Watch</option>
            <option value="airpods">AirPods</option>
          </select>
          <textarea id="admin-description" placeholder="商品描述" required></textarea>
          <label class="admin-upload-box">
            <span id="admin-image-label">选择商品图片</span>
            <input id="admin-image-file" type="file" accept="image/png,image/jpeg,image/webp,image/gif" required />
          </label>
          <img id="admin-image-preview" class="admin-image-preview" alt="商品图片预览" />
          <div class="admin-variant-grid">
            <input id="admin-color" type="text" placeholder="款式/颜色，例如 银色" />
            <input id="admin-spec" type="text" placeholder="规格，例如 256GB" />
            <input id="admin-price" type="number" min="1" step="1" placeholder="价格" required />
            <input id="admin-stock" type="number" min="0" step="1" value="999" placeholder="库存" required />
          </div>
          <button type="submit" class="buy-btn">添加商品</button>
        </form>
      </section>

      <section class="admin-panel">
        <div class="admin-panel-title">
          <h2>库存总览</h2>
          <div class="admin-filter-row">
            <input id="admin-inventory-search" type="search" placeholder="按商品名称或 SKU 搜索" />
            <button id="admin-inventory-search-btn" class="admin-icon-search" type="button" aria-label="搜索库存" title="搜索库存">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m20 20-3.5-3.5"></path>
              </svg>
            </button>
          </div>
        </div>
        <div id="admin-inventory-list" class="admin-product-list"></div>
      </section>
    </main>

    <script>
      const API_BASES = Array.from(new Set([window.location.origin, "http://localhost:3100", "http://127.0.0.1:3100"]));
      let imageFilePayload = null;

      function getCurrentAccount() {
        return localStorage.getItem("appleStoreAccount") || "";
      }

      function setTip(message, type = "") {
        const tip = document.getElementById("admin-tip");
        tip.textContent = message || "";
        tip.className = `form-tip ${type}`;
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      async function parseResponse(response) {
        const text = await response.text();
        if (!text) {
          return { data: {}, isJson: true };
        }
        try {
          return { data: JSON.parse(text), isJson: true };
        } catch (_error) {
          return { data: { message: "接口没有返回 JSON，请确认后端服务地址正确" }, isJson: false };
        }
      }

      async function requestApi(url, options = {}) {
        let lastResult = null;
        let jsonErrorResult = null;
        for (const base of API_BASES) {
          try {
            const response = await fetch(`${base}${url}`, options);
            const { data, isJson } = await parseResponse(response);
            const result = { ok: response.ok && isJson, data };
            if (result.ok || (isJson && (response.status === 401 || response.status === 403))) {
              return result;
            }
            if (isJson && !jsonErrorResult) {
              jsonErrorResult = result;
            }
            lastResult = result;
          } catch (error) {
            lastResult = { ok: false, data: { message: error.message || "网络异常" } };
          }
        }
        return jsonErrorResult || lastResult || { ok: false, data: { message: "网络异常" } };
      }

      async function apiGet(url) {
        return requestApi(url);
      }

      async function apiPost(url, payload) {
        return requestApi(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
      }

      async function apiPut(url, payload) {
        return requestApi(url, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
      }

      function makeProductId(name, category) {
        const base = `${category}-${name}`
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, "-")
          .replace(/^-+|-+$/g, "");
        const ascii = base.replace(/[^a-z0-9_-]+/g, "");
        return ascii || `${category}-${Date.now()}`;
      }

      async function ensureAdmin() {
        const account = getCurrentAccount();
        if (!account) {
          window.location.href = "login.html";
          return false;
        }
        const { ok, data } = await apiGet(`/api/admin/me?account=${encodeURIComponent(account)}`);
        if (!ok) {
          localStorage.removeItem("appleStoreAccount");
          setTip(data.message || "需要管理员 root 才能访问后台", "error");
          setTimeout(() => {
            window.location.href = "login.html";
          }, 800);
          return false;
        }
        setTip(`当前管理员：${account}`, "success");
        return true;
      }

      function renderSummary(summary) {
        const el = document.getElementById("admin-summary");
        el.innerHTML = [
          ["商品", summary.products],
          ["SKU", summary.skus],
          ["订单", summary.orders],
          ["销售额", `RMB ${summary.revenue || 0}`],
          ["低库存", summary.lowStock],
        ]
          .map(([label, value]) => `<div class="admin-metric"><span>${label}</span><strong>${value || 0}</strong></div>`)
          .join("");
      }

      function renderInventory(products) {
        const listEl = document.getElementById("admin-inventory-list");
        if (!listEl) {
          return;
        }

        if (!Array.isArray(products) || !products.length) {
          listEl.innerHTML = '<p class="empty-tip">没有匹配的商品库存。</p>';
          return;
        }

        listEl.innerHTML = products
          .map((product) => {
            const skus = Array.isArray(product.skus) ? product.skus : [];
            const totalStock = skus.reduce((sum, sku) => sum + Number(sku.stock || 0), 0);
            const image = escapeHtml(product.image || "../images/Apple-Logo.png");
            const productName = escapeHtml(product.name || product.productId);
            const category = escapeHtml(product.category || "");
            return `
              <div class="admin-product-card">
                <div class="admin-product-head">
                  <img src="${image}" alt="${productName || "商品"}" />
                  <div>
                    <p class="item-title">${productName}</p>
                    <p class="item-meta">${category} · 总库存 ${totalStock} · SKU ${skus.length}</p>
                  </div>
                </div>
                <div class="admin-sku-table">
                  ${skus.length
                    ? skus.map((sku) => `
                        <div class="admin-sku-row" data-sku-id="${sku.id}">
                          <span>${escapeHtml(sku.description || sku.skuCode)}</span>
                          <span>RMB ${sku.price || 0}</span>
                          <strong class="admin-stock-value">${sku.stock || 0}</strong>
                          <input class="admin-stock-delta" type="number" step="1" value="1" aria-label="库存调整数量" />
                          <div class="admin-stock-actions">
                            <button type="button" onclick="adjustSkuStock(${sku.id}, 'minus')">-</button>
                            <button type="button" onclick="adjustSkuStock(${sku.id}, 'plus')">+</button>
                          </div>
                        </div>
                      `).join("")
                    : '<p class="empty-tip">该商品暂无可用 SKU。</p>'}
                </div>
              </div>
            `;
          })
          .join("");
      }

      async function loadInventory() {
        const account = getCurrentAccount();
        const searchInput = document.getElementById("admin-inventory-search");
        const keyword = searchInput ? searchInput.value.trim() : "";
        const params = new URLSearchParams({ account });
        if (keyword) {
          params.set("q", keyword);
        }
        const result = await apiGet(`/api/admin/products?${params.toString()}`);
        if (!result.ok) {
          setTip(result.data.message || "读取库存失败", "error");
          renderInventory([]);
          return;
        }
        renderInventory(result.data.products || []);
      }

      async function loadAdminData() {
        const account = getCurrentAccount();
        const summaryResult = await apiGet(`/api/admin/summary?account=${encodeURIComponent(account)}`);
        if (summaryResult.ok) {
          renderSummary(summaryResult.data.summary || {});
        }
        await loadInventory();
      }

      function logoutAdmin() {
        localStorage.removeItem("appleStoreAccount");
        localStorage.removeItem("appleStoreIsAdmin");
        window.location.href = "login.html";
      }

      async function saveProduct(event) {
        event.preventDefault();
        const name = document.getElementById("admin-product-name").value.trim();
        const category = document.getElementById("admin-category").value;
        const price = Number(document.getElementById("admin-price").value || 0);
        const stock = Number(document.getElementById("admin-stock").value || 0);
        const payload = {
          account: getCurrentAccount(),
          productId: makeProductId(name, category),
          category,
          name,
          description: document.getElementById("admin-description").value.trim(),
          imageFile: imageFilePayload,
          variants: [{
            colorName: document.getElementById("admin-color").value.trim() || "默认款式",
            specName: document.getElementById("admin-spec").value.trim() || "默认配置",
            price,
            stock,
          }],
        };

        const { ok, data } = await apiPost("/api/admin/products", payload);
        if (!ok) {
          setTip(data.message || "商品入库失败", "error");
          return;
        }
        document.getElementById("admin-product-form").reset();
        document.getElementById("admin-stock").value = "999";
        document.getElementById("admin-image-preview").removeAttribute("src");
        document.getElementById("admin-image-label").textContent = "选择商品图片";
        imageFilePayload = null;
        setTip(data.message || "商品已入库", "success");
        await loadAdminData();
      }

      async function adjustSkuStock(skuId, direction) {
        const row = document.querySelector(`.admin-sku-row[data-sku-id="${skuId}"]`);
        const input = row ? row.querySelector(".admin-stock-delta") : null;
        const amount = Math.abs(Number(input ? input.value : 1) || 1);
        const delta = direction === "minus" ? -amount : amount;
        const { ok, data } = await apiPut(`/api/admin/skus/${skuId}/stock`, {
          account: getCurrentAccount(),
          delta,
          note: direction === "minus" ? "后台库存减少" : "后台库存增加",
        });
        if (!ok) {
          setTip(data.message || "库存调整失败", "error");
          return;
        }
        setTip(data.message || "库存已更新", "success");
        await loadAdminData();
      }

      function bindImageInput() {
        const input = document.getElementById("admin-image-file");
        input.addEventListener("change", () => {
          const file = input.files && input.files[0];
          if (!file) {
            imageFilePayload = null;
            return;
          }
          const reader = new FileReader();
          reader.onload = () => {
            imageFilePayload = { name: file.name, dataUrl: String(reader.result || "") };
            document.getElementById("admin-image-preview").src = imageFilePayload.dataUrl;
            document.getElementById("admin-image-label").textContent = file.name;
          };
          reader.readAsDataURL(file);
        });
      }

      window.onload = async function () {
        const ok = await ensureAdmin();
        if (!ok) {
          return;
        }
        document.getElementById("admin-refresh-btn").addEventListener("click", loadAdminData);
        document.getElementById("admin-logout-btn").addEventListener("click", logoutAdmin);
        document.getElementById("admin-menu-logout").addEventListener("click", logoutAdmin);
        document.getElementById("admin-menu-store").addEventListener("click", () => {
          window.location.href = "index.html";
        });
        document.getElementById("admin-product-form").addEventListener("submit", saveProduct);
        document.getElementById("admin-inventory-search-btn").addEventListener("click", loadInventory);
        document.getElementById("admin-inventory-search").addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            loadInventory();
          }
        });
        bindImageInput();
        await loadAdminData();
      };
    </script>
  </body>
</html>
